name: 'A11y Audit Action'
description: 'Run automated WCAG 2.2 accessibility audits against rendered pages and post results to your PR'
author: 'Dion Bedford'

branding:
  icon: 'eye'
  color: 'purple'

inputs:
  urls:
    description: 'Newline-separated URLs to audit. Auto-detects Vercel/Netlify preview URLs if omitted.'
    required: false
  wcag-level:
    description: 'WCAG conformance level (wcag2a, wcag2aa, wcag21aa, wcag22aa)'
    required: false
    default: 'wcag22aa'
  impact-threshold:
    description: 'Minimum impact to report: minor, moderate, serious, critical'
    required: false
    default: 'serious'
  fail-on-violation:
    description: 'Fail the check if violations are found'
    required: false
    default: 'true'
  comment:
    description: 'Post a PR comment with results'
    required: false
    default: 'true'
  baseline:
    description: 'Path to baseline JSON file. Only new violations (not in baseline) will be reported.'
    required: false
    default: ''
  crawl:
    description: 'Crawl same-origin links discovered on each page'
    required: false
    default: 'false'
  max-pages:
    description: 'Maximum pages to scan when crawling (ignored if crawl is false)'
    required: false
    default: '10'
  audit-scope:
    description: 'CSS selector to scope the audit (e.g. #app-root). Only elements within this scope are analysed.'
    required: false
    default: ''
  ai-api-key:
    description: 'API key for an OpenAI-compatible LLM provider. If omitted, AI suggestions are skipped.'
    required: false
    default: ''
  ai-base-url:
    description: 'OpenAI-compatible API base URL (supports OpenAI, Anthropic, Gemini, DeepSeek, Grok, GitHub Models, Groq, etc.)'
    required: false
    default: 'https://api.openai.com/v1'
  ai-model:
    description: 'Model name for AI suggestions (e.g. gpt-4o-mini, gemini-2.5-flash, claude-sonnet-4-6)'
    required: false
    default: 'gpt-4o-mini'
  ai-prompt-file:
    description: 'Path to a custom prompt file to append project-specific guidance for AI suggestions'
    required: false
    default: ''
  token:
    description: 'GitHub token for commenting on PRs'
    required: false
    default: ${{ github.token }}

outputs:
  violations-count:
    description: 'Number of new violations (excludes baseline)'
  passes-count:
    description: 'Total number of passing rules'
  result-json:
    description: 'Full axe-core results as JSON'
  new-violations-count:
    description: 'Number of violations not in baseline'
  baseline-violations-count:
    description: 'Number of violations matched to baseline'
  baseline-json:
    description: 'Updated baseline JSON (pipe to a file to update your baseline)'

runs:
  using: 'composite'
  steps:
    - name: Install dependencies
      shell: bash
      run: npm ci
      working-directory: ${{ github.action_path }}

    - name: Install Playwright Chromium
      shell: bash
      run: npx playwright install chromium --with-deps
      working-directory: ${{ github.action_path }}

    - name: Run accessibility audit
      shell: bash
      run: node ${{ github.action_path }}/dist/index.js
      env:
        INPUT_URLS: ${{ inputs.urls }}
        INPUT_WCAG-LEVEL: ${{ inputs.wcag-level }}
        INPUT_IMPACT-THRESHOLD: ${{ inputs.impact-threshold }}
        INPUT_FAIL-ON-VIOLATION: ${{ inputs.fail-on-violation }}
        INPUT_COMMENT: ${{ inputs.comment }}
        INPUT_BASELINE: ${{ inputs.baseline }}
        INPUT_CRAWL: ${{ inputs.crawl }}
        INPUT_MAX-PAGES: ${{ inputs.max-pages }}
        INPUT_AUDIT-SCOPE: ${{ inputs.audit-scope }}
        INPUT_AI-API-KEY: ${{ inputs.ai-api-key }}
        INPUT_AI-BASE-URL: ${{ inputs.ai-base-url }}
        INPUT_AI-MODEL: ${{ inputs.ai-model }}
        INPUT_AI-PROMPT-FILE: ${{ inputs.ai-prompt-file }}
        INPUT_TOKEN: ${{ inputs.token }}
